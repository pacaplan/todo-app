name: flokay
version: 1
description: Flokay workflow - proposal → specs → design → tasks → review

artifacts:
  - id: proposal
    requires: []
    template: proposal.md
    generates: proposal.md
    description: Initial proposal document outlining the change
    instruction: |
      IMPORTANT: You MUST use the `flokay:propose` skill for this step, even if you think 
      you know what the proposal is, unless you were explicitly told to skip it.
      Write a proposal document that establishes WHY this change is needed.
      Keep it concise (1-2 pages). Focus on the "why" not the "how".
      See comments in the template for section details and guidance.
      IMPORTANT: Do not create the change directory until the user has explicitly decided to proceed
      with the proposal. The propose skill includes an evaluation phase (understand → research →
      evaluate worth → explore approach) that may result in a NO-GO verdict. Only create the
      directory and write proposal.md after the user confirms they want to go ahead.
      When done, tell the user the relative path of the proposal file created.

  - id: specs
    requires: [proposal]
    template: spec.md
    generates: "specs/**/*.md"
    description: Detailed specifications for the change
    instruction: |
      IMPORTANT: You MUST use the `flokay:spec` skill for this step, even if you think 
      you know what the requirements are, unless you were explicitly told to skip it.
      Create specification files that define WHAT the system should do.
      Create one spec file per capability listed in the proposal's Capabilities section.
      Read the proposal as the input source for capability names and motivation.
      See comments in the template for formatting rules, delta operations, and guidance.
      When done, tell the user the relative path of each spec file created.

  - id: design
    requires: [specs]
    template: design.md
    generates: design.md
    description: Technical design document with implementation details
    instruction: |
      IMPORTANT: You MUST use the `flokay:design` skill for this step, even if you think 
      you know what the design is, unless you were explicitly told to skip it.
      Read all spec files in the change's specs/ directory before starting.
      Create this artifact using the specs as settled requirements and the proposal as motivation and context.
      See comments in the template for section details and guidance.
      When done, commit all changes with a message describing the design artifact created.
      Then tell the user the relative path of the design file created and that changes were committed.

  - id: tasks
    requires: [design]
    template: tasks.md
    generates: tasks.md
    description: Implementation checklist with trackable tasks
    instruction: |
      IMPORTANT: You MUST use the `flokay:plan-tasks` skill for this step.
      Create this artifact following the plan-tasks skill protocol.
      When done, commit all changes with a message describing the tasks artifact created.
      Then tell the user the relative path of tasks.md and all individual task files created, and that changes were committed.

  - id: review
    requires: [tasks]
    template: review.md
    generates: review.md
    description: Pre-implementation change review — validates design artifacts (proposal, design, specs, tasks) are coherent and ready for implementation
    instruction: |
      This is a CHANGE REVIEW, not an implementation review. The purpose is to validate
      the design artifacts (proposal, design, specs, tasks) before any code is written.
      There is no implementation code to verify at this stage — the gauntlet reviews the
      quality and coherence of the planning artifacts themselves.

      IMPORTANT: You MUST use the `gauntlet-run` skill for this step.
      The gauntlet-run skill handles the full verification loop. Follow its protocol completely.
      After the gauntlet reaches a terminal status, write review.md summarizing the results.
      See comments in the template for section details.
      When done, commit all changes with a message describing the review artifact created.
      Then tell the user the relative path of the review file created and that changes were committed.

apply:
  requires: [review]
  tracks: tasks.md
  instruction: |
    You are the tech lead for this work. You will be overseeing implementor agents
    who do the coding, but you are responsible for the successful completion of the deliverable.

    Start by reading all the change artifacts — proposal.md, design.md, all specs/ files, and
    tasks.md — and make sure you have a thorough understanding of the work. If you have any
    questions for the human, stop and ask right away before proceeding.

    Otherwise, this is a fully autonomous flow. Execute all steps below without pausing for
    user confirmation. Do NOT ask "would you like me to..." or "should I proceed with..." between
    steps. Only pause if you hit a blocker that genuinely requires human input.

    Create a task list to track progress through these steps:

    1. Implement tasks — Use the `flokay:implement-task` skill. Read tasks.md, then for each unchecked
       task (`- [ ]`), the skill dispatches a subagent to implement the work and marks it
       complete (`- [x]`) in tasks.md.
    2. Run gauntlet — Run `agent-gauntlet detect` and check the output. If the only unverified file
       is a task-tracking file (e.g. tasks.md checkbox edits), run `agent-gauntlet skip`.
       Otherwise, run the full gauntlet and fix issues before proceeding.
    3. Archive change — Invoke the `openspec-archive-change` skill. Always sync delta specs to main
       specs automatically — do not prompt the user about syncing.
    4. Run `agent-gauntlet skip` again.
    5. Finalize PR — Invoke the `flokay:finalize-pr` skill to push the PR, wait for CI, and fix any
       failures. It handles the full push → wait → fix loop with automatic retry and termination rules.
